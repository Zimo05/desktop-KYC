<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Published Videos</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f7fb;
        color: #172033;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
      }

      main {
        width: min(1120px, 100%);
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(28px, 5vw, 48px);
        line-height: 1;
        letter-spacing: 0;
      }

      .videos {
        display: grid;
        gap: 28px;
      }

      section {
        display: grid;
        gap: 12px;
      }

      h2 {
        margin: 0;
        font-size: 22px;
        line-height: 1.2;
        letter-spacing: 0;
      }

      .video-frame {
        background: #111827;
        border: 1px solid #d6dce8;
        border-radius: 8px;
        box-shadow: 0 18px 60px rgb(23 32 51 / 18%);
        overflow: hidden;
      }

      video {
        display: block;
        width: 100%;
        max-height: 78vh;
        background: #111827;
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 18px;
      }

      a {
        color: #0f5fcb;
        font-weight: 650;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Published Videos</h1>
      <div class="videos">
        <section>
          <h2>Screen Recording</h2>
          <div class="video-frame">
            <video src="public/screen.mp4" controls playsinline preload="metadata"></video>
          </div>
          <div class="links">
            <a href="public/screen.mp4">Direct screen recording file</a>
          </div>
        </section>

        <section>
          <h2>Video</h2>
          <div class="video-frame">
            <video src="public/video.mp4" controls playsinline preload="metadata"></video>
          </div>
          <div class="links">
            <a href="public/video.mp4">Direct video file</a>
          </div>
        </section>

        <section>
          <h2>Real Person</h2>
          <div class="video-frame">
            <video src="public/real-person.mp4" controls playsinline preload="metadata"></video>
          </div>
          <div class="links">
            <a href="public/real-person.mp4">Direct real person file</a>
          </div>
        </section>

        <section>
          <h2>Model</h2>
          <div class="video-frame">
            <video src="public/model.mp4" controls playsinline preload="metadata"></video>
          </div>
          <div class="links">
            <a href="public/model.mp4">Direct model file</a>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
